plugins {
    id 'com.android.application'
}

android {
    namespace 'com.overlay'
    compileSdk 33

    defaultConfig {
        applicationId "com.overlay"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
        }
        release {
            // AKTIFKAN OBFUSCATION DI SINI
            minifyEnabled true
            shrinkResources false // Jangan shrink resources karena kita hanya butuh DEX
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // Tambahkan signing config jika perlu, tapi untuk DEX saja biasanya tidak wajib di sini
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    // No external deps - keep DEX minimal
}
